<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .upload-section {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .upload-section.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .file-input {
            display: none;
        }

        .upload-button {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }

        .upload-button:hover {
            background: #764ba2;
        }

        .file-list {
            margin-top: 20px;
            text-align: left;
        }

        .file-item {
            background: #f5f5f5;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-file {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
        }

        .metadata-section {
            margin: 20px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .submit-button {
            background: #28a745;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }

        .submit-button:hover {
            background: #218838;
        }

        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }

        .success {
            color: #28a745;
            margin-bottom: 10px;
        }

        .error {
            color: #dc3545;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .supported-formats {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .supported-formats ul {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 RAG Document Upload</h1>
        <p class="subtitle">Upload documents to your RAG knowledge base</p>

        <div class="supported-formats">
            <strong>Supported formats:</strong>
            <ul>
                <li>PDF (.pdf)</li>
                <li>Text (.txt)</li>
                <li>Word (.docx)</li>
            </ul>
        </div>

        <div class="upload-section" id="dropZone">
            <p style="margin-bottom: 15px;">📎 Drag and drop files here or</p>
            <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.txt,.docx">
            <button class="upload-button" onclick="document.getElementById('fileInput').click()">
                Choose Files
            </button>
            <div class="file-list" id="fileList"></div>
        </div>

        <div class="metadata-section">
            <div class="form-group">
                <label for="category">Category (optional)</label>
                <input type="text" id="category" placeholder="e.g., technical, research, documentation">
            </div>
            <div class="form-group">
                <label for="source">Source (optional)</label>
                <input type="text" id="source" placeholder="e.g., manual-upload, web, email">
            </div>
        </div>

        <button class="submit-button" id="submitButton" onclick="uploadFiles()" disabled>
            Upload to RAG System
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Processing documents...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://localhost:7267/api/rag';
        let selectedFiles = [];

        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const dropZone = document.getElementById('dropZone');
        const submitButton = document.getElementById('submitButton');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        fileInput.addEventListener('change', handleFileSelect);

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function handleFileSelect(e) {
            handleFiles(e.target.files);
        }

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            updateFileList();
            submitButton.disabled = selectedFiles.length === 0;
        }

        function updateFileList() {
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                return;
            }

            fileList.innerHTML = '<h4 style="margin-bottom: 10px;">Selected Files:</h4>';
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span>${file.name} (${formatFileSize(file.size)})</span>
                    <button class="remove-file" onclick="removeFile(${index})">Remove</button>
                `;
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            submitButton.disabled = selectedFiles.length === 0;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function uploadFiles() {
            if (selectedFiles.length === 0) return;

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            const category = document.getElementById('category').value;
            const source = document.getElementById('source').value;

            if (category) formData.append('category', category);
            if (source) formData.append('source', source);

            submitButton.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                displayError(error.message);
            } finally {
                loading.style.display = 'none';
                submitButton.disabled = false;
            }
        }

        function displayResults(data) {
            results.innerHTML = '';
            results.style.display = 'block';

            const summary = document.createElement('div');
            summary.innerHTML = `
                <h3>Upload Summary</h3>
                <p>Total Files: ${data.totalFiles}</p>
                <p class="success">✅ Successful: ${data.successCount}</p>
                ${data.failureCount > 0 ? `<p class="error">❌ Failed: ${data.failureCount}</p>` : ''}
            `;
            results.appendChild(summary);

            if (data.documents && data.documents.length > 0) {
                const successSection = document.createElement('div');
                successSection.innerHTML = '<h4 style="margin-top: 20px; color: #28a745;">Successfully Processed:</h4>';
                data.documents.forEach(doc => {
                    const docDiv = document.createElement('div');
                    docDiv.className = 'file-item';
                    docDiv.innerHTML = `
                        <div>
                            <strong>${doc.metadata.filename}</strong><br>
                            <small>ID: ${doc.id}</small>
                        </div>
                    `;
                    successSection.appendChild(docDiv);
                });
                results.appendChild(successSection);
            }

            if (data.errors && data.errors.length > 0) {
                const errorSection = document.createElement('div');
                errorSection.innerHTML = '<h4 style="margin-top: 20px; color: #dc3545;">Errors:</h4>';
                data.errors.forEach(err => {
                    const errDiv = document.createElement('div');
                    errDiv.className = 'error';
                    errDiv.innerHTML = `<strong>${err.fileName}:</strong> ${err.error}`;
                    errorSection.appendChild(errDiv);
                });
                results.appendChild(errorSection);
            }

            // Clear selected files
            selectedFiles = [];
            fileInput.value = '';
            updateFileList();
        }

        function displayError(message) {
            results.innerHTML = `<div class="error"><strong>Error:</strong> ${message}</div>`;
            results.style.display = 'block';
        }
    </script>
</body>
</html>
